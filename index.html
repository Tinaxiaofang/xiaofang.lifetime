<!DOCTYPE html>
<html lang="zh-CN">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width,
             initial-scale=1.0"
  >

  <title>小方树洞</title>

  <!-- CSS -->

  <link
    rel="stylesheet"
    href="style.css"
  >

  <!-- App -->

  <link
    rel="manifest"
    href="manifest.json"
  >

  <meta
    name="theme-color"
    content="#f5efe6"
  >

  <!-- 地图 -->

  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

</head>

<body>

<!-- 登录 -->

<div class="login-box">

  <h1>小方树洞</h1>

  <p class="login-text">

    青春会过去，
    但记忆不会。

  </p>

  <input
    type="text"
    id="usernameInput"
    placeholder="账号"
  >

  <input
    type="password"
    id="passwordInput"
    placeholder="密码"
  >

  <button id="passwordBtn">

    登录

  </button>

  <div class="line"></div>

  <button id="loginBtn">

    Google 登录

  </button>

</div>

<!-- 主体 -->

<div id="siteContent">

  <div class="film-grain"></div>

  <!-- Hero -->

  <header class="hero">

    <div class="hero-content">

      <h1>小方树洞</h1>

      <p class="subtitle">

        把人生藏进时间里。

      </p>

      <p class="quote">

        “总有一些时光，
        值得被偷偷收藏。”

      </p>

    </div>

  </header>

  <!-- 功能 -->

  <section class="menu-grid">

    <div
      class="card"
      onclick="scrollToSection('diary-box')"
    >

      📝

      <span>日记</span>

    </div>

    <div
      class="card"
      onclick="scrollToSection('photo-wall')"
    >

      📷

      <span>照片</span>

    </div>

    <div
      class="card"
      onclick="scrollToSection('map-section')"
    >

      🌍

      <span>地图</span>

    </div>

    <div
      class="card"
      onclick="scrollToSection('memory-box')"
    >

      ✨

      <span>回忆</span>

    </div>

  </section>

  <!-- 那年今天 -->

  <section
    class="memory-box"
    id="memory-box"
  >

    <h2>⏳ 那年今天</h2>

    <div id="memoryContent">

      正在读取记忆...

    </div>

  </section>

  <!-- 日记 -->

  <section
    class="diary-box"
    id="diary-box"
  >

    <h2>📝 今日心情</h2>

    <input
      type="text"
      id="diaryTitle"
      placeholder="标题"
    >

    <textarea
      id="diaryContent"
      placeholder="写下今天的故事..."
    ></textarea>

    <input
      type="text"
      id="diaryLocation"
      placeholder="地点（例如：吉达）"
    >

    <button id="saveDiaryBtn">

      保存日记

    </button>

  </section>

  <!-- 日记列表 -->

  <div id="diaryList"></div>

  <!-- 上传照片 -->

  <section class="upload-box">

    <h2>📷 上传照片</h2>

    <input
      type="file"
      id="photoInput"
      accept="image/*"
    >

    <input
      type="text"
      id="photoLocation"
      placeholder="照片地点"
    >

    <button id="uploadBtn">

      上传照片

    </button>

  </section>

  <!-- 照片墙 -->

  <div
    class="photo-wall"
    id="photoList"
  ></div>

  <!-- 地图 -->

  <section
    class="map-section"
    id="map-section"
  >

    <h2>🗺 人生地图</h2>

    <div id="map"></div>

  </section>

  <!-- 时间轴 -->

  <section class="timeline">

    <h2>📅 成长时间轴</h2>

    <div class="timeline-item">

      <span class="year">
        18岁
      </span>

      <p>
        第一次离开熟悉的地方。
      </p>

    </div>

    <div class="timeline-item">

      <span class="year">
        19岁
      </span>

      <p>
        来到沙特，
        开始新的生活。
      </p>

    </div>

    <div class="timeline-item">

      <span class="year">
        20岁
      </span>

      <p>
        小方树洞诞生。
      </p>

    </div>

  </section>

  <!-- 底部导航 -->

  <nav class="bottom-nav">

    <button
      onclick="scrollToSection('diary-box')"
    >

      📝

      <span>日记</span>

    </button>

    <button
      onclick="scrollToSection('photo-wall')"
    >

      📷

      <span>照片</span>

    </button>

    <button
      onclick="scrollToSection('map-section')"
    >

      🌍

      <span>地图</span>

    </button>

    <button
      onclick="scrollToSection('memory-box')"
    >

      ✨

      <span>回忆</span>

    </button>

  </nav>

</div>

<!-- 地图 -->

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- App -->

<script
  type="module"
  src="app.js"
></script>

</body>

</html>
