<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>小方树洞</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 登录区域 -->

<div class="login-box">

  <button id="loginBtn">
    进入小方树洞
  </button>

  <p id="userInfo"></p>

</div>

<!-- 网站内容 -->

<div id="siteContent" style="display:none;">

  <div class="film-grain"></div>

  <header class="hero">

    <div class="hero-content">

      <h1>小方树洞</h1>

      <p class="subtitle">
        把人生藏进时间里。
      </p>

      <p class="quote">
        “总有一些时光，值得被偷偷收藏。”
      </p>

    </div>

  </header>

  <section class="today-card">

    <h2>📖 今日记录</h2>

    <div class="entry">

      <p>
        今天，小方树洞正式诞生了。<br>
        从这一刻开始，旅行、朋友、爱与成长，都将被认真记录。
      </p>

      <div class="meta">
        📍 吉达 · 2026.05.20
      </div>

    </div>

  </section>

  <section class="menu-grid">

    <div class="card">📝 日记</div>
    <div class="card">✨ 感想</div>
    <div class="card">📷 照片</div>
    <div class="card">👥 朋友</div>
    <div class="card">❤️ 恋人</div>
    <div class="card">🌍 旅行</div>
    <div class="card">📌 重要事件</div>
    <div class="card">🗺 人生地图</div>

  </section>

  <section class="timeline">

    <h2>📅 成长时间轴</h2>

    <div class="timeline-item">
      <span class="year">18岁</span>
      <p>第一次离开熟悉的地方。</p>
    </div>

    <div class="timeline-item">
      <span class="year">19岁</span>
      <p>来到沙特，开始新的生活。</p>
    </div>

    <div class="timeline-item">
      <span class="year">20岁</span>
      <p>小方树洞诞生。</p>
    </div>

  </section>

  <section class="gallery">

    <h2>📷 胶片记忆墙</h2>

    <div class="photo-grid">

      <div class="photo">旅行照片</div>
      <div class="photo">朋友瞬间</div>
      <div class="photo">城市夜晚</div>
      <div class="photo">青春记忆</div>

    </div>

  </section>

  <footer>

    <p>© 小方树洞 · Xiaofang Memory Archive</p>

    <p class="footer-small">
      青春会过去，但记忆不会。
    </p>

  </footer>

</div>

<!-- Firebase -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithPopup,
  GoogleAuthProvider
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {

  apiKey: "AIzaSyBp3yXkRP1BaAxXqscVb7NuFWmUtMn4xPI",

  authDomain: "xiaofanglife.firebaseapp.com",

  projectId: "xiaofanglife",

  storageBucket: "xiaofanglife.appspot.com",

  messagingSenderId: "34189068819",

  appId: "1:34189068819:web:2f17d673b2fdd750200de6"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

const loginBtn =
document.getElementById("loginBtn");

const userInfo =
document.getElementById("userInfo");

const siteContent =
document.getElementById("siteContent");

siteContent.style.display = "none";

loginBtn.addEventListener("click", async () => {

  try {

    const result =
    await signInWithPopup(auth, provider);

    const user = result.user;

    userInfo.innerHTML =
    `欢迎回来，${user.displayName}`;

    loginBtn.style.display = "none";

    siteContent.style.display = "block";

  }

  catch (error) {

    console.error(error);

    alert("登录失败");

  }

});

console.log("小方树洞 Firebase 已连接");

</script>

</body>

</html>
